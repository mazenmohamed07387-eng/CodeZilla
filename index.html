<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeZilla | Cloud Storage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .progress-container { width: 100%; background: #111; border-radius: 5px; margin-top: 15px; display: none; border: 1px solid #333; }
        .progress-bar { height: 12px; background: linear-gradient(90deg, #00f3ff, #bc00ff); width: 0%; border-radius: 5px; box-shadow: 0 0 15px #00f3ff; transition: 0.4s; }
        .status-text { color: #00f3ff; font-size: 0.95rem; margin-top: 15px; word-break: break-all; font-family: monospace; }
        .copy-btn { background: #bc00ff; color: white; border: none; padding: 8px 15px; cursor: pointer; margin-top: 15px; display: none; border-radius: 5px; font-weight: bold; box-shadow: 0 0 10px #bc00ff; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CODE<span>ZILLA</span></div>
    </header>

    <main>
        <section class="hero">
            <h1 class="glitch">مركز رفع CodeZilla v3</h1>
            <p>مرحباً يا مازن، جرب الرفع الآن.</p>
            
            <div class="upload-container">
                <div class="drop-zone">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: #bc00ff;"></i>
                    <p>اختر الملف للرفع</p>
                    <input type="file" id="fileInput" hidden>
                    <button class="neon-btn" onclick="document.getElementById('fileInput').click()">اختيار ملف</button>
                    
                    <div class="progress-container" id="progCont">
                        <div class="progress-bar" id="progBar"></div>
                    </div>
                    <p class="status-text" id="status"></p>
                    <button class="copy-btn" id="copyBtn">نسخ الرابط</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>المطور: <span class="designer">Mazen Mohamed</span></p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>

    <script>
        // بياناتك الجديدة يا مازن
        const firebaseConfig = {
            apiKey: "AIzaSyA662gbWiCyQ58pobewQ4IfgOr9a23AOBQ",
            authDomain: "codezilla-aabd1.firebaseapp.com",
            projectId: "codezilla-aabd1",
            storageBucket: "codezilla-aabd1.firebasestorage.app",
            messagingSenderId: "1085363320749",
            appId: "1:1085363320749:web:228fecb90804e2d6a65324"
        };

        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('status');
        const progBar = document.getElementById('progBar');
        const progCont = document.getElementById('progCont');
        const copyBtn = document.getElementById('copyBtn');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            progCont.style.display = 'block';
            statusText.innerText = 'جاري محاولة الرفع...';

            const storageRef = storage.ref('uploads/' + file.name);
            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progBar.style.width = progress + '%';
                    statusText.innerText = 'تم رفع: ' + Math.round(progress) + '%';
                }, 
                (error) => {
                    statusText.innerText = '⚠️ خطأ: السيرفر لسه مقفول من Firebase Rules';
                    console.error(error);
                }, 
                () => {
                    uploadTask.snapshot.ref.getDownloadURL().then((url) => {
                        statusText.innerHTML = `✅ تم الرفع!<br><a href="${url}" target="_blank" style="color:#00f3ff;">تحميل الملف</a>`;
                        copyBtn.style.display = 'inline-block';
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(url);
                            alert('تم النسخ!');
                        };
                    });
                }
            );
        };
    </script>
</body>
</html>
