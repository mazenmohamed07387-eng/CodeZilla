<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeZilla | Cloud Storage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">CODE<span>ZILLA</span></div>
        <nav>
            <ul>
                <li><a href="#">الرئيسية</a></li>
                <li><a href="#">ملفاتي</a></li>
                <li><a href="#">الإعدادات</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1 class="glitch" data-text="مركز رفع الملفات الآمن">مركز رفع الملفات الآمن</h1>
            <p>مرحباً بك في المنطقة المشفرة. ارفع ملفاتك الآن.</p>
            
            <div class="upload-container">
                <div class="drop-zone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اسحب الملفات هنا أو اضغط للاختيار</p>
                    <input type="file" id="fileInput" hidden>
                    <button class="neon-btn">اختر ملف</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>المصمم: <span class="designer">Mazen Mohamed</span></p>
        <p class="link-display">mazentech.com</p>
    </footer>

</body>
</html>
