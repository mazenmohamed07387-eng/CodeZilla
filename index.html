<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeZilla | Cloud Storage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .progress-container { width: 100%; background: #111; border-radius: 5px; margin-top: 15px; display: none; border: 1px solid #333; }
        .progress-bar { height: 12px; background: linear-gradient(90deg, #00f3ff, #bc00ff); width: 0%; border-radius: 5px; box-shadow: 0 0 15px #00f3ff; transition: 0.4s; }
        .status-text { color: #00f3ff; font-size: 0.95rem; margin-top: 15px; word-break: break-all; font-family: monospace; }
        .copy-btn { background: #bc00ff; color: white; border: none; padding: 8px 15px; cursor: pointer; margin-top: 15px; display: none; border-radius: 5px; font-weight: bold; box-shadow: 0 0 10px #bc00ff; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CODE<span>ZILLA</span></div>
        <nav>
            <ul>
                <li><a href="#">الرئيسية</a></li>
                <li><a href="https://console.firebase.google.com/" target="_blank">لوحة التحكم</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1 class="glitch">مركز رفع ملفات CodeZilla</h1>
            <p>مرحباً يا مازن، السيرفر السحابي جاهز لاستقبال ملفاتك.</p>
            
            <div class="upload-container">
                <div class="drop-zone">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: #bc00ff;"></i>
                    <p>اختر الملف المراد تشفيره ورفعه</p>
                    <input type="file" id="fileInput" hidden>
                    <button class="neon-btn" onclick="document.getElementById('fileInput').click()">اختيار ملف</button>
                    
                    <div class="progress-container" id="progCont">
                        <div class="progress-bar" id="progBar"></div>
                    </div>
                    <p class="status-text" id="status"></p>
                    <button class="copy-btn" id="copyBtn">نسخ رابط الملف</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>المطور: <span class="designer">Mazen Mohamed</span></p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>

    <script>
        // بيانات الـ Config الجديدة الخاصة بك يا مازن
        const firebaseConfig = {
          apiKey: "AIzaSyA662gbWiCyQ58pobewQ4IfgOr9a23AOBQ",
          authDomain: "codezilla-aabd1.firebaseapp.com",
          projectId: "codezilla-aabd1",
          storageBucket: "codezilla-aabd1.firebasestorage.app",
          messagingSenderId: "1085363320749",
          appId: "1:1085363320749:web:03707560a6cfac92a65324"
        };

        // بدء تشغيل فايربيز
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('status');
        const progBar = document.getElementById('progBar');
        const progCont = document.getElementById('progCont');
        const copyBtn = document.getElementById('copyBtn');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            progCont.style.display = 'block';
            copyBtn.style.display = 'none';
            statusText.innerText = 'جاري الاتصال بالسيرفر ورفع الملف...';

            // رفع الملف لمجلد اسمه uploads
            const storageRef = storage.ref('uploads/' + file.name);
            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progBar.style.width = progress + '%';
                }, 
                (error) => {
                    statusText.innerText = 'خطأ: تأكد من تفعيل Storage في Firebase وتغيير Rules لـ true';
                    console.error(error);
                }, 
                () => {
                    uploadTask.snapshot.ref.getDownloadURL().then((url) => {
                        statusText.innerHTML = `تم الرفع بنجاح! ✅<br><a href="${url}" target="_blank" style="color:#00f3ff; text-decoration:underline;">تحميل الملف من هنا</a>`;
                        copyBtn.style.display = 'inline-block';
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(url);
                            alert('تم نسخ الرابط بنجاح!');
                        };
                    });
                }
            );
        };
    </script>
</body>
</html>
