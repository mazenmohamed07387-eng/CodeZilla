<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeZilla | Cloud Storage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .progress-container { width: 100%; background: #111; border-radius: 5px; margin-top: 15px; display: none; border: 1px solid #333; }
        .progress-bar { height: 12px; background: linear-gradient(90deg, #00f3ff, #bc00ff); width: 0%; border-radius: 5px; box-shadow: 0 0 15px #00f3ff; transition: 0.4s; }
        .status-text { color: #00f3ff; font-size: 0.95rem; margin-top: 15px; word-break: break-all; font-family: monospace; text-align: center; }
        .copy-btn { background: #bc00ff; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-top: 15px; display: none; border-radius: 5px; font-weight: bold; box-shadow: 0 0 15px #bc00ff; width: 100%; }
        .neon-btn:hover { box-shadow: 0 0 20px #00f3ff; transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <div class="logo">CODE<span>ZILLA</span></div>
    </header>

    <main>
        <section class="hero">
            <h1 class="glitch">مرحباً يا مازن</h1>
            <p>ارفع ملفاتك الآن على سيرفر CodeZilla الجديد.</p>
            
            <div class="upload-container">
                <div class="drop-zone" style="border: 2px dashed #bc00ff; padding: 30px; border-radius: 15px;">
                    <i class="fas fa-cloud-upload-alt" style="font-size: 3.5rem; color: #00f3ff; margin-bottom: 15px;"></i>
                    <p>اضغط لاختيار الملف</p>
                    <input type="file" id="fileInput" hidden>
                    <button class="neon-btn" onclick="document.getElementById('fileInput').click()">اختيار ملف</button>
                    
                    <div class="progress-container" id="progCont">
                        <div class="progress-bar" id="progBar"></div>
                    </div>
                    <p class="status-text" id="status"></p>
                    <button class="copy-btn" id="copyBtn"><i class="fas fa-copy"></i> نسخ رابط الملف</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>المطور: <span class="designer">Mazen Mohamed</span></p>
    </footer>
